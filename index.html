<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ووردلات - أفضل ووردل بالعربي</title>
<meta name="description" content="ووردلات: العب أفضل ووردل بالعربي. تحدى أصدقاءك أونلاين أو العب وحيداً!">
<meta name="keywords" content="ووردل, عربي, لعبة كلمات, ووردلات, wordle arabic, wordlat">
<meta property="og:title" content="ووردلات - أفضل ووردل بالعربي">
<meta property="og:description" content="تحدى أصدقاءك أونلاين أو العب وحيداً! جرب ووردلات الآن.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Almarai',sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:#050608;color:#f8fafc;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;overflow:hidden;}

.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-glow::before{content:'';position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(83,186,103,0.08) 0%,transparent 70%);border-radius:50%;}
.bg-glow::after{content:'';position:absolute;bottom:-20%;left:30%;width:400px;height:400px;background:radial-gradient(circle,rgba(203,176,63,0.06) 0%,transparent 70%);border-radius:50%;}

.card{position:relative;z-index:1;width:100%;max-width:420px;background:linear-gradient(145deg,rgba(18,20,24,0.95),rgba(10,10,12,0.98));border:1px solid rgba(255,255,255,0.06);border-radius:32px;padding:48px 32px 40px;text-align:center;box-shadow:0 40px 80px -20px rgba(0,0,0,0.9),0 0 0 1px rgba(255,255,255,0.04);}

.logo{display:inline-flex;align-items:center;gap:14px;margin-bottom:32px;justify-content:center;}
.logo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;width:52px;height:52px;}
.lt{border-radius:3px;background:#3a3a3c;border:1px solid rgba(255,255,255,0.1);}
.lt.g{background:#53BA67;border-color:#53BA67;box-shadow:0 0 10px rgba(83,186,103,0.45);}
.lt.y{background:#CBB03F;border-color:#CBB03F;box-shadow:0 0 10px rgba(203,176,63,0.45);}
.logo-name{font-size:2.6rem;font-weight:800;color:white;line-height:1;}

.tagline{font-size:1.1rem;font-weight:800;color:rgba(255,255,255,0.85);margin-bottom:8px;}
.subtitle{font-size:0.85rem;font-weight:700;color:rgba(255,255,255,0.35);margin-bottom:36px;line-height:1.7;}

.features{display:flex;justify-content:center;gap:24px;margin-bottom:36px;}
.feat{display:flex;flex-direction:column;align-items:center;gap:6px;}
.feat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:white;}
.feat-icon.green{background:linear-gradient(135deg,#53BA67,#3a8a4a);}
.feat-icon.gold{background:linear-gradient(135deg,#CBB03F,#9e8020);}
.feat-icon.blue{background:linear-gradient(135deg,#4a90d9,#2d6cb5);}
.feat-label{font-size:0.7rem;font-weight:800;color:rgba(255,255,255,0.4);}

.cta-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#53BA67,#3a8a4a);color:white;font-size:1.05rem;font-weight:800;cursor:pointer;font-family:'Almarai',sans-serif;transition:all 0.25s;box-shadow:0 8px 25px rgba(83,186,103,0.3);text-decoration:none;margin-bottom:12px;}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(83,186,103,0.45);}
.cta-btn:active{transform:translateY(0);box-shadow:0 4px 15px rgba(83,186,103,0.3);}
.cta-btn i{font-size:0.9rem;transition:transform 0.25s;}
.cta-btn:hover i{transform:translateX(-4px);}

.footer{margin-top:24px;font-size:0.7rem;font-weight:700;color:rgba(255,255,255,0.2);}

@media(max-width:480px){
    body{padding:0;align-items:stretch;}
    .card{max-width:100%;border-radius:0;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;border:none;}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.logo{animation:fadeUp 0.6s ease;}
.tagline{animation:fadeUp 0.6s ease 0.1s both;}
.subtitle{animation:fadeUp 0.6s ease 0.2s both;}
.features{animation:fadeUp 0.6s ease 0.3s both;}
.cta-btn{animation:fadeUp 0.6s ease 0.4s both;}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="card">
    <div class="logo">
        <div class="logo-grid">
            <div class="lt y"></div><div class="lt"></div><div class="lt g"></div>
            <div class="lt"></div><div class="lt g"></div><div class="lt"></div>
            <div class="lt g"></div><div class="lt"></div><div class="lt y"></div>
        </div>
        <span class="logo-name">ووردلات</span>
    </div>

    <h1 class="tagline">أفضل ووردل بالعربي</h1>
    <p class="subtitle">اختبر ذكاءك في تخمين الكلمات العربية<br>العب لحالك أو تحدّى أصدقاءك أونلاين!</p>

    <div class="features">
        <div class="feat">
            <div class="feat-icon green"><i class="fas fa-font"></i></div>
            <span class="feat-label">فردي</span>
        </div>
        <div class="feat">
            <div class="feat-icon gold"><i class="fas fa-bolt"></i></div>
            <span class="feat-label">1v1 أونلاين</span>
        </div>
        <div class="feat">
            <div class="feat-icon blue"><i class="fas fa-chart-bar"></i></div>
            <span class="feat-label">إحصائيات</span>
        </div>
    </div>

    <a href="https://wordlat.com" class="cta-btn">
        اضغط هنا للانتقال إلى ووردلات
        <i class="fas fa-chevron-left"></i>
    </a>

    <div class="footer">© 2026 ووردلات لألغاز العربية</div>
</div>

</body>
</html>
